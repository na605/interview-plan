<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F5F0E8; --dark: #1A1A1A; --warm-dark: #2C2416;
  --gold: #C9A84C; --sage: #7A9E7E; --indigo: #6366F1;
  --rust: #C4622D; --muted: #8A8070; --border: rgba(0,0,0,0.08);
}
body { background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--dark); padding: 40px 20px; }
.wrap { max-width: 980px; margin: 0 auto; }
.page-title { font-size: 30px; font-weight: 500; color: var(--warm-dark); margin-bottom: 4px; }
.page-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; font-weight: 300; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
.stat { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
.stat-num { font-size: 24px; font-weight: 500; color: var(--warm-dark); display: block; margin-bottom: 2px; }
.stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.progress-wrap { margin-bottom: 24px; }
.progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.progress-track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--warm-dark); border-radius: 99px; transition: width 0.4s; }
.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.week-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.week-tab { padding: 6px 15px; border-radius: 99px; border: 1px solid var(--border); font-size: 13px; cursor: pointer; background: #fff; color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.week-tab:hover { border-color: var(--warm-dark); color: var(--warm-dark); }
.week-tab.active { background: var(--warm-dark); color: #fff; border-color: var(--warm-dark); }
.week-title { font-size: 19px; font-weight: 500; color: var(--warm-dark); margin-bottom: 3px; }
.week-focus { font-size: 13px; color: var(--muted); font-weight: 300; margin-bottom: 18px; }
.days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(195px, 1fr)); gap: 10px; margin-bottom: 18px; }
.day-card { background: #fff; border: 1px solid var(--border); border-radius: 13px; padding: 15px; cursor: pointer; transition: border-color 0.15s; position: relative; }
.day-card:hover { border-color: rgba(0,0,0,0.18); }
.day-card.done { border-color: var(--sage); }
.done-badge { position: absolute; top: 11px; right: 11px; width: 17px; height: 17px; border-radius: 50%; background: var(--sage); display: none; align-items: center; justify-content: center; }
.done-badge svg { width: 9px; height: 9px; stroke: #fff; stroke-width: 2.5; fill: none; }
.day-card.done .done-badge { display: flex; }
.day-lbl { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
.tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 99px; margin-bottom: 7px; font-weight: 500; }
.tag-code { background: rgba(99,102,241,0.1); color: #4338CA; }
.tag-design { background: rgba(201,168,76,0.15); color: #92580A; }
.tag-behav { background: rgba(122,158,126,0.15); color: #3D6B42; }
.tag-research { background: rgba(196,98,45,0.12); color: #9A3412; }
.tag-rest { background: rgba(138,128,112,0.1); color: var(--muted); }
.day-title { font-size: 13px; font-weight: 500; color: var(--warm-dark); margin-bottom: 9px; }
.day-tasks { list-style: none; }
.day-tasks li { font-size: 11px; color: var(--muted); padding: 3px 0; display: flex; align-items: flex-start; gap: 5px; line-height: 1.5; }
.day-tasks li::before { content: '–'; color: #ccc; flex-shrink: 0; }
.day-tasks a { color: var(--indigo); text-decoration: none; font-size: 11px; }
.day-tasks a:hover { text-decoration: underline; }
.week-nav { display: flex; justify-content: space-between; align-items: center; }
.nav-btn { padding: 7px 16px; border-radius: 99px; border: 1px solid var(--border); font-size: 13px; cursor: pointer; background: #fff; color: var(--muted); font-family: 'DM Sans', sans-serif; }
.nav-btn:hover:not(:disabled) { border-color: var(--warm-dark); color: var(--warm-dark); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.reset-btn { font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: 'DM Sans', sans-serif; }
</style>

        {t: "Write down everything you remember from the interview", url: null},
        {t: "Note what went well and what to improve next time", url: null},
        {t: "Rest — you earned it", url: null},
      ]},
      { label: "Sun", title: "Reset", tag: "rest", tasks: [
        {t: "If waiting for feedback — keep applying elsewhere", url: null},
        {t: "Stay in motion — don't fixate on one outcome", url: null},
        {t: "You are better prepared than most candidates", url: null},
      ]},
    ]
  },
];

const tagClasses = { code:'tag-code', design:'tag-design', behav:'tag-behav', research:'tag-research', rest:'tag-rest' };
const tagLabels = { code:'Coding', design:'System design', behav:'Behavioural', research:'Research', rest:'Rest' };

let currentWeek = 0;
let done = {};
try { done = JSON.parse(localStorage.getItem('prepDone2') || '{}'); } catch(e) {}

function save() { try { localStorage.setItem('prepDone2', JSON.stringify(done)); } catch(e) {} }
function key(w,d) { return w+'-'+d; }
function totalDays() { return weeks.reduce((a,w)=>a+w.days.length,0); }
function doneDays() { return Object.values(done).filter(Boolean).length; }
function streak() {
  let s=0;
  for(let w=0;w<weeks.length;w++) for(let d=0;d<weeks[w].days.length;d++) { if(done[key(w,d)]) s++; else return s; }
  return s;
}
function renderStats() {
  const total=totalDays(), d=doneDays(), pct=total?Math.round(d/total*100):0;
  document.getElementById('statsRow').innerHTML=[
    ['📅',d+' / '+total,'days completed'],
    ['🏆',pct+'%','overall progress'],
    ['🔥',streak(),'day streak'],
  ].map(([i,n,l])=>`<div class="stat"><span class="stat-num">${i} ${n}</span><span class="stat-lbl">${l}</span></div>`).join('');
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
}
function renderTabs() {
  document.getElementById('weekTabs').innerHTML=weeks.map((w,i)=>
    `<button class="week-tab${i===currentWeek?' active':''}" onclick="setWeek(${i})">Week ${i+1}</button>`
  ).join('');
}
function renderWeek() {
  const w=weeks[currentWeek];
  document.getElementById('weekTitle').textContent=w.title;
  document.getElementById('weekFocus').textContent=w.focus;
  document.getElementById('daysGrid').innerHTML=w.days.map((d,i)=>{
    const k=key(currentWeek,i), isDone=done[k];
    const tasks=d.tasks.map(t=>
      t.url
        ? `<li><a href="${t.url}" target="_blank" rel="noopener">${t.t} ↗</a></li>`
        : `<li>${t.t}</li>`
    ).join('');
    return `<div class="day-card${isDone?' done':''}" onclick="handleCardClick(event,${i})">
      <div class="done-badge"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
      <p class="day-lbl">${d.label}</p>
      <div class="tag ${tagClasses[d.tag]}">${tagLabels[d.tag]}</div>
      <p class="day-title">${d.title}</p>
      <ul class="day-tasks">${tasks}</ul>
    </div>`;
  }).join('');
  document.getElementById('prevBtn').disabled=currentWeek===0;
  document.getElementById('nextBtn').disabled=currentWeek===weeks.length-1;
}
function handleCardClick(e,i) {
  if(e.target.tagName==='A') return;
  const k=key(currentWeek,i); done[k]=!done[k]; save(); renderWeek(); renderStats();
}
function setWeek(i) { currentWeek=i; renderTabs(); renderWeek(); }
function changeWeek(dir) { currentWeek=Math.max(0,Math.min(weeks.length-1,currentWeek+dir)); renderTabs(); renderWeek(); }
function resetAll() { if(confirm('Reset all progress?')) { done={}; save(); renderWeek(); renderStats(); } }

renderTabs(); renderWeek(); renderStats();
</script>
</body>
</html>
