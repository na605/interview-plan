<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prep Plan">
<meta name="theme-color" content="#2C2416">
<title>Interview Prep</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F5F0E8; --dark: #1A1A1A; --warm-dark: #2C2416;
  --gold: #C9A84C; --sage: #7A9E7E; --indigo: #6366F1;
  --rust: #C4622D; --muted: #8A8070; --border: rgba(0,0,0,0.08);
  --white: #FFFFFF;
}
html { height: 100%; }
body {
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--dark);
  min-height: 100%;
  padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
  padding-top: max(env(safe-area-inset-top, 0px), 20px);
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 40px);
}
.wrap { max-width: 980px; margin: 0 auto; padding: 20px 16px; }

/* Header */
.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
.page-title { font-size: 26px; font-weight: 500; color: var(--warm-dark); margin-bottom: 2px; }
.page-sub { font-size: 13px; color: var(--muted); font-weight: 300; }
.install-btn {
  background: var(--warm-dark); color: var(--gold); border: none;
  padding: 8px 14px; border-radius: 99px; font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: 'DM Sans', sans-serif; display: none; white-space: nowrap;
}

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
.stat { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 500; color: var(--warm-dark); display: block; margin-bottom: 2px; }
.stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

/* Progress */
.progress-wrap { margin-bottom: 20px; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.progress-track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--warm-dark); border-radius: 99px; transition: width 0.4s ease; }

/* Legend */
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* Week tabs */
.week-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 16px; }
.week-tab {
  padding: 6px 13px; border-radius: 99px; border: 1px solid var(--border);
  font-size: 12px; cursor: pointer; background: var(--white); color: var(--muted);
  font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.week-tab:hover { border-color: var(--warm-dark); color: var(--warm-dark); }
.week-tab.active { background: var(--warm-dark); color: var(--white); border-color: var(--warm-dark); }

/* Week header */
.week-title { font-size: 18px; font-weight: 500; color: var(--warm-dark); margin-bottom: 3px; }
.week-focus { font-size: 12px; color: var(--muted); font-weight: 300; margin-bottom: 16px; line-height: 1.5; }

/* Days grid */
.days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 9px; margin-bottom: 16px; }
@media (max-width: 500px) { .days-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 360px) { .days-grid { grid-template-columns: 1fr; } }

.day-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 13px; padding: 14px; cursor: pointer;
  transition: border-color 0.15s; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.day-card:hover { border-color: rgba(0,0,0,0.18); }
.day-card.done { border-color: var(--sage); }

.done-badge {
  position: absolute; top: 10px; right: 10px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--sage); display: none;
  align-items: center; justify-content: center;
}
.done-badge svg { width: 10px; height: 10px; stroke: var(--white); stroke-width: 2.5; fill: none; }
.day-card.done .done-badge { display: flex; }

.day-lbl { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 99px; margin-bottom: 6px; font-weight: 500; }
.tag-code { background: rgba(99,102,241,0.1); color: #4338CA; }
.tag-design { background: rgba(201,168,76,0.15); color: #92580A; }
.tag-behav { background: rgba(122,158,126,0.15); color: #3D6B42; }
.tag-research { background: rgba(196,98,45,0.12); color: #9A3412; }
.tag-rest { background: rgba(138,128,112,0.1); color: var(--muted); }

.day-title { font-size: 13px; font-weight: 500; color: var(--warm-dark); margin-bottom: 8px; }
.day-tasks { list-style: none; }
.day-tasks li { font-size: 11px; color: var(--muted); padding: 2px 0; display: flex; align-items: flex-start; gap: 5px; line-height: 1.5; }
.day-tasks li::before { content: '–'; color: #ccc; flex-shrink: 0; }
.day-tasks a { color: var(--indigo); text-decoration: none; font-size: 11px; }
.day-tasks a:hover { text-decoration: underline; }

/* Nav */
.week-nav { display: flex; justify-content: space-between; align-items: center; }
.nav-btn {
  padding: 8px 16px; border-radius: 99px; border: 1px solid var(--border);
  font-size: 12px; cursor: pointer; background: var(--white); color: var(--muted);
  font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.nav-btn:hover:not(:disabled) { border-color: var(--warm-dark); color: var(--warm-dark); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.reset-btn { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: 'DM Sans', sans-serif; }

/* Loading state */
.loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header">
    <div>
      <h1 class="page-title">Interview prep plan</h1>
      <p class="page-sub">6 weeks · Tap a day to mark done · Saves to your device</p>
    </div>
    <button class="install-btn" id="installBtn">＋ Install app</button>
  </div>

  <div class="stats" id="statsRow"><div class="loading">Loading...</div></div>

  <div class="progress-wrap">
    <div class="progress-label"><span>Overall progress</span><span id="progressPct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#6366F1"></div>Coding</div>
    <div class="legend-item"><div class="legend-dot" style="background:#C9A84C"></div>System design</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7A9E7E"></div>Behavioural</div>
    <div class="legend-item"><div class="legend-dot" style="background:#C4622D"></div>Research</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ccc"></div>Rest</div>
  </div>

  <div class="week-tabs" id="weekTabs"></div>
  <p class="week-title" id="weekTitle"></p>
  <p class="week-focus" id="weekFocus"></p>
  <div class="days-grid" id="daysGrid"><div class="loading">Loading your progress...</div></div>

  <div class="week-nav">
    <button class="nav-btn" id="prevBtn" onclick="changeWeek(-1)">← Prev week</button>
    <button class="reset-btn" onclick="resetAll()">Reset progress</button>
    <button class="nav-btn" id="nextBtn" onclick="changeWeek(1)">Next week →</button>
  </div>
</div>

      {t:"Practise your opening: walk me through your background",url:null},
      {t:"Practise your closing questions for interviewers",url:null},
    ]},
    {label:"Thu",title:"Day before interview",tag:"rest",tasks:[
      {t:"No new material — rest your brain",url:null},
      {t:"Prepare setup: good lighting, quiet room, water",url:null},
      {t:"Sleep early",url:null},
    ]},
    {label:"Fri",title:"Interview day",tag:"rest",tasks:[
      {t:"Eat well before the interview",url:null},
      {t:"Log in 5 mins early — test your connection",url:null},
      {t:"You have prepared well. Trust yourself.",url:null},
    ]},
    {label:"Sat",title:"Reflect & rest",tag:"rest",tasks:[
      {t:"Write down everything you remember from the interview",url:null},
      {t:"Note what went well and what to improve",url:null},
      {t:"Rest — you earned it",url:null},
    ]},
    {label:"Sun",title:"Reset",tag:"rest",tasks:[
      {t:"Keep applying elsewhere — don't fixate on one outcome",url:null},
      {t:"Stay in motion",url:null},
      {t:"You are better prepared than most candidates",url:null},
    ]},
  ]},
];

// ── INDEXEDDB ────────────────────────────────────────────────────────────────
const DB_NAME = 'PrepPlanDB';
const DB_VERSION = 1;
const STORE = 'progress';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}

function dbGet(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(id);
    req.onsuccess = e => resolve(e.target.result ? e.target.result.value : null);
    req.onerror = e => reject(e);
  });
}

function dbPut(id, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put({ id, value });
    req.onsuccess = () => resolve();
    req.onerror = e => reject(e);
  });
}

function dbClear() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).clear();
    req.onsuccess = () => resolve();
    req.onerror = e => reject(e);
  });
}

// ── APP STATE ────────────────────────────────────────────────────────────────
const tagClasses = { code:'tag-code', design:'tag-design', behav:'tag-behav', research:'tag-research', rest:'tag-rest' };
const tagLabels  = { code:'Coding', design:'System design', behav:'Behavioural', research:'Research', rest:'Rest' };

let currentWeek = 0;
let done = {};

function key(w, d) { return `${w}-${d}`; }
function totalDays() { return weeks.reduce((a, w) => a + w.days.length, 0); }
function doneDays() { return Object.values(done).filter(Boolean).length; }

function streak() {
  let s = 0;
  for (let w = 0; w < weeks.length; w++)
    for (let d = 0; d < weeks[w].days.length; d++)
      if (done[key(w, d)]) s++; else return s;
  return s;
}

async function saveState() {
  await dbPut('done', done);
  await dbPut('currentWeek', currentWeek);
}

async function loadState() {
  const savedDone = await dbGet('done');
  const savedWeek = await dbGet('currentWeek');
  if (savedDone) done = savedDone;
  if (savedWeek !== null) currentWeek = savedWeek;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderStats() {
  const total = totalDays(), d = doneDays();
  const pct = total ? Math.round(d / total * 100) : 0;
  document.getElementById('statsRow').innerHTML = [
    ['📅', `${d} / ${total}`, 'days completed'],
    ['🏆', `${pct}%`, 'overall progress'],
    ['🔥', streak(), 'day streak'],
  ].map(([i, n, l]) => `<div class="stat"><span class="stat-num">${i} ${n}</span><span class="stat-lbl">${l}</span></div>`).join('');
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

function renderTabs() {
  document.getElementById('weekTabs').innerHTML = weeks.map((w, i) =>
    `<button class="week-tab${i === currentWeek ? ' active' : ''}" onclick="setWeek(${i})">Week ${i + 1}</button>`
  ).join('');
}

function renderWeek() {
  const w = weeks[currentWeek];
  document.getElementById('weekTitle').textContent = w.title;
  document.getElementById('weekFocus').textContent = w.focus;
  document.getElementById('daysGrid').innerHTML = w.days.map((d, i) => {
    const k = key(currentWeek, i), isDone = done[k];
    const tasks = d.tasks.map(t =>
      t.url
        ? `<li><a href="${t.url}" target="_blank" rel="noopener">${t.t} ↗</a></li>`
        : `<li>${t.t}</li>`
    ).join('');
    return `<div class="day-card${isDone ? ' done' : ''}" onclick="handleCardClick(event,${i})">
      <div class="done-badge"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
      <p class="day-lbl">${d.label}</p>
      <div class="tag ${tagClasses[d.tag]}">${tagLabels[d.tag]}</div>
      <p class="day-title">${d.title}</p>
      <ul class="day-tasks">${tasks}</ul>
    </div>`;
  }).join('');
  document.getElementById('prevBtn').disabled = currentWeek === 0;
  document.getElementById('nextBtn').disabled = currentWeek === weeks.length - 1;
}

function render() { renderStats(); renderTabs(); renderWeek(); }

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function handleCardClick(e, i) {
  if (e.target.tagName === 'A') return;
  const k = key(currentWeek, i);
  done[k] = !done[k];
  saveState();
  renderWeek();
  renderStats();
}

function setWeek(i) {
  currentWeek = i;
  saveState();
  renderTabs();
  renderWeek();
}

function changeWeek(dir) {
  currentWeek = Math.max(0, Math.min(weeks.length - 1, currentWeek + dir));
  saveState();
  renderTabs();
  renderWeek();
}

async function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  done = {};
  currentWeek = 0;
  await dbClear();
  render();
}

// ── PWA INSTALL ───────────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
  deferredPrompt = null;
});

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
openDB().then(loadState).then(render).catch(err => {
  console.warn('IndexedDB failed, falling back to in-memory:', err);
  render();
});
</script>
